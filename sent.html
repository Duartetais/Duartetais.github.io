<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagem Enviada | Tais Duarte</title>
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .success-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .success-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 60px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            max-width: 600px;
            z-index: 10;
        }

        .success-icon {
            font-size: 5rem;
            color: var(--primary);
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 15px;
        }

        p {
            color: #e4e4e7;
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="bg-tech"></canvas>

    <main class="success-page">
        <article class="success-content">
            <div class="success-icon">
                <i class='bx bx-check-circle'></i>
            </div>

            <h1>E-mail enviado!</h1>
            <p>Obrigada por entrar em contato, Taís Duarte aqui. <br> 
            Recebi sua mensagem e responderei o mais breve possível.</p>

            <a href="index.html" class="btn-primary" style="text-decoration: none; padding: 15px 30px; border-radius: 50px; background: var(--primary); color: #000; font-weight: bold;">
                Voltar ao Portfólio
            </a>
        </article>
    </main>

    <script src="assets/js/particles.js"></script>
</body>
</html>
